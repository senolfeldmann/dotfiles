# ─── Font ────────────────────────────────────────────────────────
font_family      FiraCode Nerd Font
bold_font        FiraCode Nerd Font Bold
italic_font      FiraCode Nerd Font Regular
bold_italic_font auto
font_size        12.0

font_features FiraCodeNerdFont-Regular  +liga +calt
font_features FiraCodeNerdFont-Bold     +liga +calt


# ─── Cursor ──────────────────────────────────────────────────────
cursor                 #fabd2f
cursor_text_color      #282828
cursor_shape           block
cursor_blink_interval  0


# ─── Scrollback ──────────────────────────────────────────────────
# tmux handles scrollback; keep this minimal
scrollback_lines        2000
wheel_scroll_multiplier 5.0


# ─── Mouse ───────────────────────────────────────────────────────
mouse_hide_wait  3.0
copy_on_select   yes
open_url_with    default
url_color        #83a598
url_style        curly


# ─── Performance ─────────────────────────────────────────────────
repaint_delay   8
input_delay     2
sync_to_monitor yes


# ─── Bell ────────────────────────────────────────────────────────
enable_audio_bell    no
visual_bell_duration 0.0


# ─── Window ──────────────────────────────────────────────────────
window_padding_width    2
window_border_width     1px
draw_minimal_borders    yes
active_border_color     #fabd2f
inactive_border_color   #504945
confirm_os_window_close 1
background_opacity      1


# ─── Tabs ────────────────────────────────────────────────────────
tab_bar_style           powerline
tab_powerline_style     slanted
active_tab_foreground   #282828
active_tab_background   #fabd2f
active_tab_font_style   bold
inactive_tab_foreground #a89984
inactive_tab_background #3c3836
tab_bar_background      #1d2021


# ─── Gruvbox Dark Medium ─────────────────────────────────────────
background  #282828
foreground  #ebdbb2

selection_foreground  #282828
selection_background  #d79921

color0   #282828
color8   #928374
color1   #cc241d
color9   #fb4934
color2   #98971a
color10  #b8bb26
color3   #d79921
color11  #fabd2f
color4   #458588
color12  #83a598
color5   #b16286
color13  #d3869b
color6   #689d6a
color14  #8ec07c
color7   #a89984
color15  #ebdbb2


# ─── Misc ────────────────────────────────────────────────────────
shell_integration  enabled
term               xterm-kitty
strip_trailing_spaces smart
undercurl_style    thin-sparse


# ─── Keybindings ─────────────────────────────────────────────────
# Shift+Insert: xterm/Konsole-style paste from PRIMARY selection.
# Needed for Handy's transcription paste; it injects Shift+Insert
# via ydotool and expects the focused app to paste natively.
map shift+insert paste_from_clipboard

# Shift+Enter: send raw LF (\x0a = Ctrl+J) instead of the default \r.
#
# Bypasses Kitty/tmux keyboard-protocol negotiation entirely. \x0a has meant
# "newline" in terminal-land since the PDP-11 era (readline, vim insert,
# Claude Code, most REPLs), and tmux forwards the byte transparently.
#
# Trade-off: apps that negotiate CSI-u or the Kitty keyboard protocol to
# distinguish Shift+Enter from plain Enter (e.g. Neovim/Helix with the
# protocol actively enabled) now see Ctrl+J and can no longer tell them
# apart. If that ever becomes a problem, remove this line; no other state
# to revert.
map shift+enter send_text all \x0a
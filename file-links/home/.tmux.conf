unbind C-b
set -g prefix C-Space
bind r source ~/.tmux.conf
bind-key C-Space last-window
setw -g mode-keys vi
set -g mouse on
bind m set -g mouse
# Create new window in same PWD (required since 1.9)
bind-key c neww -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -c "#{pane_current_path}"

# Enable extended keys for shift+enter support (e.g. Claude Code newline).
# "always" forces tmux to forward CSI-u sequences to apps unconditionally;
# "on" would only forward them after the app requests them via CSI > 1 u,
# which Claude Code doesn't do reliably through a tmux layer.
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

# toggle keybindings source: https://www.freecodecamp.org/news/tmux-in-practice-local-and-nested-remote-tmux-sessions-4f7ba5db8795/
color_status_text="colour245"
color_window_off_status_bg="colour238"
color_light="white" #colour015
color_dark="colour232" # black= colour232
color_window_off_status_current_bg="colour254"

bind -T root F12  \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=$color_status_text,bg=$color_window_off_status_bg" \;\
  set window-status-current-format "#[fg=$color_window_off_status_bg,bg=$color_window_off_status_current_bg]$separator_powerline_right#[default] #I:#W# #[fg=$color_window_off_status_current_bg,bg=$color_window_off_status_bg]$separator_powerline_right#[default]" \;\
  set window-status-current-style "fg=$color_dark,bold,bg=$color_window_off_status_current_bg" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S \;\

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-style \;\
  set -u window-status-current-format \;\
  refresh-client -S
  
wg_is_keys_off="#[fg=$color_light,bg=$color_window_off_indicator]#([ $(tmux show-option -qv key-table) = 'off' ] && echo 'OFF')#[default]"

set -g status-right "$wg_is_keys_off #{sysstat_cpu} | #{sysstat_mem} | #{sysstat_loadavg} | $wg_user_host"

# List of plugins
# Legacy: Uncomment the following line if you don't use brew on linux
# if-shell '[[ "$OSTYPE" != "darwin"* ]]' "set -g @plugin 'tmux-plugins/tpm'"
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'
# Legacy: Use the following 2 lines instead if you don't use brew on linux
# if-shell '[[ "$OSTYPE" == "darwin"* ]]' "run '$HOMEBREW_PREFIX/opt/tpm/share/tpm/tpm'"
# if-shell '[[ "$OSTYPE" != "darwin"* ]]' "run -b '~/.tmux/plugins/tpm/tpm'"